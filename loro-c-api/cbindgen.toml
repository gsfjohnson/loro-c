# cbindgen configuration for loro-c-api.
#
# The header is generated by the pinned cbindgen CLI (0.29.4), NOT by a build.rs:
#   cbindgen --config loro-c-api/cbindgen.toml --crate loro-c-api --output include/loro/loro.h
# (or via the CMake `regenerate-header` target). The generated include/loro/loro.h is
# committed and is the source of truth for IDEs and for CI jobs without a Rust toolchain.

language = "C"
header = "/* Generated by cbindgen from loro-c-api. DO NOT EDIT BY HAND.\n   Regenerate with the CMake `regenerate-header` target. */"
include_guard = "LORO_LORO_H"
pragma_once = false
autogen_warning = ""
tab_width = 4
documentation = true
documentation_style = "doxy"
cpp_compat = true
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]
no_includes = true

[parse]
parse_deps = false

[export]
prefix = ""

[enum]
prefix_with_name = false
rename_variants = "None"

[fn]
sort_by = "None"

[layout]
